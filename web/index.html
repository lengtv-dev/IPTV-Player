<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/web/" />
  <title>BKL Play</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>

  <!-- Header -->
  <header id="app-header">
    <span class="logo">▶ BKL Play</span>
    <nav id="breadcrumb" aria-label="breadcrumb"></nav>
    <div id="search-container">
      <input type="text" id="search-input" placeholder="ค้นหา..." autocomplete="off" spellcheck="false" />
      <button id="search-clear" class="hidden" title="ล้างการค้นหา">✕</button>
      <div id="search-results" class="hidden"></div>
    </div>
  </header>

  <!-- Main content -->
  <main id="app-main">
    <div id="loading" class="center-screen">
      <div class="spinner"></div>
      <p>กำลังโหลด...</p>
    </div>
    <div id="error-view" class="center-screen hidden">
      <div class="error-icon">⚠️</div>
      <p id="error-message"></p>
    </div>
    <div id="grid-view" class="hidden"></div>
  </main>

  <!-- Video Player Overlay -->
  <div id="player-overlay" class="hidden">

    <!-- Top header (auto-hide) -->
    <div id="player-header">
      <button id="player-back" title="กลับ (Esc)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <span id="player-title"></span>
    </div>

    <!-- Video -->
    <video id="player-video" autoplay></video>

    <!-- Episode picker panel -->
    <div id="ep-panel" class="hidden">
      <div id="ep-panel-header">
        <span id="ep-panel-title">เลือกตอน</span>
        <button id="ep-panel-close">✕</button>
      </div>
      <div id="ep-panel-grid"></div>
    </div>

    <!-- Bottom control bar (auto-hide) -->
    <div id="player-bar">
      <!-- Progress -->
      <div id="player-progress-row">
        <input type="range" id="player-seek" min="0" max="100" step="0.01" value="0" />
      </div>
      <!-- Buttons -->
      <div id="player-btn-row">
        <div class="bar-group">
          <button id="btn-prev-ep" title="ตอนก่อนหน้า">⏮</button>
          <button id="btn-rewind" title="ย้อน 10 วินาที">−10s</button>
          <button id="btn-playpause" title="เล่น/หยุด">▶</button>
          <button id="btn-forward" title="ข้าม 10 วินาที">+10s</button>
          <button id="btn-next-ep" title="ตอนถัดไป">⏭</button>
          <span id="player-time">0:00 / 0:00</span>
        </div>
        <div class="bar-group">
          <button id="btn-track" class="hidden" title="เปลี่ยนภาษา"></button>
          <button id="btn-episodes" title="เลือกตอน">☰ EP</button>
          <button id="btn-mute" title="ปิด/เปิดเสียง">🔊</button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" title="ระดับเสียง" />
          <button id="btn-fullscreen" title="เต็มหน้าจอ">⛶</button>
        </div>
      </div>
    </div>

    <!-- Up Next toast -->
    <div id="upnext-toast" class="hidden">
      <div id="upnext-content">
        <img id="upnext-thumb" src="" alt="" />
        <div class="upnext-text">
          <small>เล่นถัดไปใน <span id="upnext-countdown">5</span> วินาที</small>
          <strong id="upnext-title"></strong>
        </div>
        <div class="upnext-buttons">
          <button id="upnext-play-now">เล่นเลย</button>
          <button id="upnext-cancel">ยกเลิก</button>
        </div>
      </div>
      <div id="upnext-bar"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
